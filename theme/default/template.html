<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{HTML_TITLE}}</title>
    <meta name="markdown-hash" content="{{MARKDOWN_HASH}}" />
    <meta name="theme-hash" content="{{THEME_HASH}}" />
    <script>
      (() => {
        try {
          const key = "markdownvibe-theme";
          const stored = localStorage.getItem(key);
          const preference =
            stored === "day" || stored === "night" || stored === "auto" ? stored : "auto";
          const storageScope =
            window.location.origin && window.location.origin !== "null"
              ? window.location.origin
              : window.location.href;
          const templateKey = `markdownvibe-template:${storageScope}`;
          const storedTemplate = localStorage.getItem(templateKey);
          const template = ["parchment", "blueprint", "moss", "ember", "harbor"].includes(
            storedTemplate,
          )
            ? storedTemplate
            : "parchment";
          const prefersNight =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          const resolved = preference === "auto" ? (prefersNight ? "night" : "day") : preference;
          document.documentElement.dataset.themePreference = preference;
          document.documentElement.dataset.resolvedTheme = resolved;
          document.documentElement.dataset.templateProfile = template;
        } catch {}
      })();
    </script>
    <link rel="icon" href="{{ASSET_PREFIX}}/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="{{ASSET_PREFIX}}/theme.css" />
    <link rel="stylesheet" href="{{ASSET_PREFIX}}/highlight.css" />
    <script defer src="{{ASSET_PREFIX}}/theme.js"></script>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="topbar-start">
          <button
            class="toc-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="toc-panel"
            aria-label="Open contents"
            data-toc-toggle
          >
            <span class="hamburger" aria-hidden="true">
              <span class="hamburger-bar"></span>
              <span class="hamburger-bar"></span>
              <span class="hamburger-bar"></span>
            </span>
            <span class="control-label">Contents</span>
          </button>
          <a class="brand" href="/">{{APP_NAME}}</a>
          <span class="server-chip" aria-label="Current server" data-server-origin>
            <span class="server-chip-label">Server</span>
            <a class="server-chip-value" data-server-origin-value href="/">Loading</a>
          </span>
          <nav class="pathbar" aria-label="Current path" data-pathbar hidden>
            <ol class="path-list" data-path-breadcrumbs>
              <li class="path-item">
                <span class="path-current">Loading path</span>
              </li>
            </ol>
            <a
              class="path-download"
              data-raw-download
              data-raw-download-path="{{RAW_DOWNLOAD_PATH}}"
              href="/"
              hidden
              download
              aria-label="Download raw markdown"
              title="Download raw markdown"
            >
              <svg viewBox="0 0 20 20" focusable="false" aria-hidden="true">
                <path
                  d="M10 3.75v7.5m0 0 3-3m-3 3-3-3M4.75 13.5v1a.75.75 0 0 0 .75.75h9a.75.75 0 0 0 .75-.75v-1"
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="1.5"
                />
              </svg>
              <span class="sr-only">Download raw markdown</span>
            </a>
          </nav>
        </div>
        <div class="topbar-end">
          <label class="template-picker" data-template-picker>
            <span class="template-picker-field">
              <span class="template-picker-dot" aria-hidden="true"></span>
              <select class="template-select" data-template-select aria-label="Surface template">
                <option value="parchment">Parchment · Warm</option>
                <option value="blueprint">Blueprint · Cool</option>
                <option value="moss">Moss · Calm</option>
                <option value="ember">Ember · Bold</option>
                <option value="harbor">Harbor · Deep</option>
              </select>
            </span>
          </label>
          <div class="theme-switcher theme-switcher-desktop" role="group" aria-label="Color theme">
            <button
              class="theme-option"
              type="button"
              data-theme-choice="auto"
              aria-label="Use system theme"
              title="Auto"
            >
              <span class="theme-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path
                    d="M4 7.5A3.5 3.5 0 0 1 7.5 4h9A3.5 3.5 0 0 1 20 7.5v9a3.5 3.5 0 0 1-3.5 3.5h-9A3.5 3.5 0 0 1 4 16.5zm2 0v9A1.5 1.5 0 0 0 7.5 18H11V6H7.5A1.5 1.5 0 0 0 6 7.5m7 10.5h3.5a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 16.5 6H13z"
                    fill="currentColor"
                  />
                </svg>
              </span>
              <span class="sr-only">Auto</span>
            </button>
            <button
              class="theme-option"
              type="button"
              data-theme-choice="day"
              aria-label="Use day theme"
              title="Day"
            >
              <span class="theme-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <circle cx="12" cy="12" r="4" fill="currentColor" />
                  <path
                    d="M12 2.75v2.5M12 18.75v2.5M21.25 12h-2.5M5.25 12H2.75M18.54 5.46l-1.77 1.77M7.23 16.77l-1.77 1.77M18.54 18.54l-1.77-1.77M7.23 7.23 5.46 5.46"
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-width="1.7"
                  />
                </svg>
              </span>
              <span class="sr-only">Day</span>
            </button>
            <button
              class="theme-option"
              type="button"
              data-theme-choice="night"
              aria-label="Use night theme"
              title="Night"
            >
              <span class="theme-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path
                    d="M14.79 3.8A8.5 8.5 0 1 0 20.2 15.9a7 7 0 1 1-5.41-12.1"
                    fill="currentColor"
                  />
                </svg>
              </span>
              <span class="sr-only">Night</span>
            </button>
          </div>
          <details class="mobile-menu" data-mobile-menu>
            <summary class="mobile-menu-toggle" aria-label="Open display menu">Display</summary>
            <div class="mobile-menu-panel">
              <p class="mobile-menu-label">Template</p>
              <label class="template-picker template-picker-mobile" data-template-picker>
                <span class="template-picker-field">
                  <span class="template-picker-dot" aria-hidden="true"></span>
                  <select class="template-select" data-template-select aria-label="Surface template">
                    <option value="parchment">Parchment · Warm</option>
                    <option value="blueprint">Blueprint · Cool</option>
                    <option value="moss">Moss · Calm</option>
                    <option value="ember">Ember · Bold</option>
                    <option value="harbor">Harbor · Deep</option>
                  </select>
                </span>
              </label>
              <p class="mobile-menu-label">Color theme</p>
              <div class="theme-switcher theme-switcher-mobile" role="group" aria-label="Color theme">
                <button
                  class="theme-option"
                  type="button"
                  data-theme-choice="auto"
                  aria-label="Use system theme"
                  title="Auto"
                >
                  <span class="theme-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false">
                      <path
                        d="M4 7.5A3.5 3.5 0 0 1 7.5 4h9A3.5 3.5 0 0 1 20 7.5v9a3.5 3.5 0 0 1-3.5 3.5h-9A3.5 3.5 0 0 1 4 16.5zm2 0v9A1.5 1.5 0 0 0 7.5 18H11V6H7.5A1.5 1.5 0 0 0 6 7.5m7 10.5h3.5a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 16.5 6H13z"
                        fill="currentColor"
                      />
                    </svg>
                  </span>
                  <span class="sr-only">Auto</span>
                </button>
                <button
                  class="theme-option"
                  type="button"
                  data-theme-choice="day"
                  aria-label="Use day theme"
                  title="Day"
                >
                  <span class="theme-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false">
                      <circle cx="12" cy="12" r="4" fill="currentColor" />
                      <path
                        d="M12 2.75v2.5M12 18.75v2.5M21.25 12h-2.5M5.25 12H2.75M18.54 5.46l-1.77 1.77M7.23 16.77l-1.77 1.77M18.54 18.54l-1.77-1.77M7.23 7.23 5.46 5.46"
                        fill="none"
                        stroke="currentColor"
                        stroke-linecap="round"
                        stroke-width="1.7"
                      />
                    </svg>
                  </span>
                  <span class="sr-only">Day</span>
                </button>
                <button
                  class="theme-option"
                  type="button"
                  data-theme-choice="night"
                  aria-label="Use night theme"
                  title="Night"
                >
                  <span class="theme-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false">
                      <path
                        d="M14.79 3.8A8.5 8.5 0 1 0 20.2 15.9a7 7 0 1 1-5.41-12.1"
                        fill="currentColor"
                      />
                    </svg>
                  </span>
                  <span class="sr-only">Night</span>
                </button>
              </div>
            </div>
          </details>
        </div>
      </header>
      <div class="layout">
        <aside class="toc-panel" id="toc-panel" data-toc-panel>
          <div class="toc-header">
            <span>Contents</span>
            <button class="toc-close" type="button" aria-label="Close contents" data-toc-close>
              Close
            </button>
          </div>
          <nav class="toc-nav" aria-label="Table of contents">
            {{TOC}}
          </nav>
        </aside>
        <main class="document">
          <p class="eyebrow">{{SOURCE_PATH}}</p>
          <h1>{{TITLE}}</h1>
          {{SUMMARY}}
          {{META}}
          <article class="prose" data-source-path="{{SOURCE_PATH}}">{{CONTENT}}</article>
        </main>
      </div>
      <div class="scrim" hidden data-toc-scrim></div>
    </div>
  </body>
</html>
